# 通用分流逻辑（三分流 CN/Global/AI），与 site.yaml 由 merge_config.py 合并后生成 config.yaml
# 不包含 forward_cn / forward_global / forward_ai / ai_domains（由 sites.yaml 中 SITE 对应节点提供）

log:
  level: error
  file: "/etc/mosdns/mosdns.log"

api:
  http: "127.0.0.1:9091"

plugins:
  - tag: custom_hosts
    type: hosts
    args:
      files:
        - "/etc/mosdns/rules/custom-hosts.txt"

  - tag: custom_local_domains
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/custom-local.txt"

  - tag: custom_remote_domains
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/custom-remote.txt"

  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/direct-list.txt"

  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - "/etc/mosdns/rules/china_ip_list.txt"

  - tag: geosite_apple
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/apple-cn.txt"

  - tag: geosite_no_cn
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/proxy-list.txt"

  - tag: geosite_gfw
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/geosite-gfw.txt"

  - tag: lazy_cache
    type: cache
    args:
      size: 10240
      lazy_cache_ttl: 600
      dump_file: "/etc/mosdns/cache.dump"
      dump_interval: 30

  - tag: has_resp_sequence
    type: sequence
    args:
      - matches: has_resp
        exec: accept

  - tag: query_custom_hosts
    type: sequence
    args:
      - exec: $custom_hosts
      - exec: jump has_resp_sequence

  - tag: query_custom_local
    type: sequence
    args:
      - matches: qname $custom_local_domains
        exec: $forward_cn

  - tag: query_custom_remote
    type: sequence
    args:
      - matches: qname $custom_remote_domains
        exec: $forward_global

  - tag: query_ai
    type: sequence
    args:
      - matches: qname $ai_domains
        exec: $forward_ai

  - tag: cn_sequence
    type: sequence
    args:
      - exec: $forward_cn
      - exec: jump has_resp_sequence

  - tag: global_sequence
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $forward_global
      - exec: jump has_resp_sequence

  - tag: query_global_must_not_be_cn
    type: sequence
    args:
      - exec: $global_sequence
      - matches: resp_ip $geoip_cn
        exec: drop_resp

  - tag: query_is_cn_domain
    type: sequence
    args:
      - matches: qname $geosite_cn $geosite_apple
        exec: $cn_sequence

  - tag: query_is_global_domain
    type: sequence
    args:
      - matches: qname $geosite_no_cn $geosite_gfw
        exec: $global_sequence

  - tag: fallback
    type: fallback
    args:
      primary: query_global_must_not_be_cn
      secondary: cn_sequence
      threshold: 300
      always_standby: true

  - tag: main_sequence
    type: sequence
    args:
      - exec: $lazy_cache
      - exec: $query_custom_local
      - exec: jump has_resp_sequence
      - exec: $query_ai
      - exec: jump has_resp_sequence
      - exec: $query_custom_remote
      - exec: jump has_resp_sequence
      - exec: $query_custom_hosts
      - exec: jump has_resp_sequence
      - exec: $query_is_global_domain
      - exec: jump has_resp_sequence
      - exec: $query_is_cn_domain
      - exec: jump has_resp_sequence
      - exec: $fallback

  # UDP/TCP DNS 服务器：默认监听 53 端口（标准 DNS 端口）
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: "0.0.0.0:{{MOSDNS_LISTEN_PORT}}"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: "0.0.0.0:{{MOSDNS_LISTEN_PORT}}"

  # DoH：端口与证书路径由 merge_config 从环境变量替换（默认 8443，不占 443）
  - tag: doh_server
    type: http_server
    args:
      entries:
        - path: /dns-query
          exec: main_sequence
      listen: "0.0.0.0:{{DOH_PORT}}"
      cert: "{{DOH_CERT_DIR}}/fullchain.pem"
      key: "{{DOH_CERT_DIR}}/privkey.pem"
      idle_timeout: 10
