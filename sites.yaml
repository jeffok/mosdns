# 各站点 forward / ai_domains / DoH 配置
# 由 merge_config.py 根据 SITE 选择后与 config.base.yaml 合并生成 config.yaml
# SITE 取值：sz（深圳家）/ hk（hkcloud）/ dxb（迪拜家）

sz:
  plugins:
    - tag: forward_cn
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 119.29.29.29
          - addr: 223.5.5.5
          - addr: 114.114.114.114
    - tag: forward_global
      type: forward
      args:
        concurrent: 1
        upstreams:
          - addr: 10.100.50.222:53
    - tag: forward_ai
      type: forward
      args:
        concurrent: 1
        upstreams:
          - addr: 10.100.89.3:53
    - tag: ai_domains
      type: domain_set
      args:
        files:
          - "/etc/mosdns/rules/ai-list.txt"

hk:
  plugins:
    - tag: forward_cn
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 119.29.29.29
          - addr: 223.5.5.5
          - addr: 114.114.114.114
    - tag: forward_global
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
          - addr: 9.9.9.9
    - tag: forward_ai
      type: forward
      args:
        concurrent: 1
        upstreams:
          - addr: 10.100.89.3:53
    - tag: ai_domains
      type: domain_set
      args:
        files:
          - "/etc/mosdns/rules/ai-list.txt"

dxb:
  plugins:
    - tag: forward_cn
      type: forward
      args:
        concurrent: 1
        upstreams:
          - addr: 10.100.50.222:53
    - tag: forward_global
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
          - addr: 9.9.9.9
    - tag: forward_ai
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
          - addr: 9.9.9.9
    - tag: ai_domains
      type: domain_set
      args:
        files:
          - "/etc/mosdns/rules/ai-list.txt"
