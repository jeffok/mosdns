# 各站点 forward / ai_domains 配置，由 merge_config.py 根据环境变量 SITE 选择后与 config.base.yaml 合并生成 config.yaml
# SITE 取值：sz（深圳家）/ hk（hkcloud）/ sgp（sgpcloud）/ dxb（迪拜家）
# 占位符部署时替换或通过策略路由：<HKCLOUD_DNS_IN_TUNNEL_IP>、<SGPCLOUD_DNS_IN_TUNNEL_IP>、<HKCLOUD_DNS_FOR_DXB_TUNNEL_IP>

sz:
  plugins:
    - tag: forward_cn
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 223.5.5.5
          - addr: 119.29.29.29
          - addr: 114.114.114.114
    - tag: forward_global
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: <HKCLOUD_DNS_IN_TUNNEL_IP>:5353
    - tag: forward_ai
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: <SGPCLOUD_DNS_IN_TUNNEL_IP>:5353
          - addr: 1.1.1.1
          - addr: 8.8.8.8
    - tag: ai_domains
      type: domain_set
      args:
        files:
          - "/etc/mosdns/rules/ai-list.txt"

hk:
  plugins:
    - tag: forward_cn
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 223.5.5.5
          - addr: 119.29.29.29
          - addr: 114.114.114.114
    - tag: forward_global
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
          - addr: 9.9.9.9
    - tag: forward_ai
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: <SGPCLOUD_DNS_IN_TUNNEL_IP>:5353
          - addr: 1.1.1.1
          - addr: 8.8.8.8
    - tag: ai_domains
      type: domain_set
      args:
        files:
          - "/etc/mosdns/rules/ai-list.txt"

sgp:
  plugins:
    - tag: forward_cn
      type: forward
      args:
        concurrent: 2
        upstreams:
          - addr: 223.5.5.5
          - addr: 119.29.29.29
    - tag: forward_global
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
    - tag: forward_ai
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
    - tag: ai_domains
      type: domain_set
      args:
        files:
          - "/etc/mosdns/rules/ai-list.txt"

dxb:
  # 迪拜家：默认走本地；仅 CN 走隧道回国（hkcloud 深圳侧），占位符 <HKCLOUD_DNS_FOR_DXB_TUNNEL_IP>
  plugins:
    - tag: forward_cn
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: <HKCLOUD_DNS_FOR_DXB_TUNNEL_IP>:5353
    - tag: forward_global
      type: forward
      args:
        concurrent: 3
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
    - tag: forward_ai
      type: forward
      args:
        concurrent: 2
        upstreams:
          - addr: 1.1.1.1
          - addr: 8.8.8.8
    - tag: ai_domains
      type: domain_set
      args:
        files:
          - "/etc/mosdns/rules/ai-list.txt"
