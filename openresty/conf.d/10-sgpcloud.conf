# sgpcloud: 993 DoH 转发到 hkcloud + VLESS-WS

server {
    listen 993 ssl;
    server_name doh.jeffok.com;
    ssl_certificate /etc/openresty/ssl/jeffok.com.crt;
    ssl_certificate_key /etc/openresty/ssl/jeffok.com.key;

    location /dns-query {
        proxy_pass https://10.100.50.252:8443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /graph {
        proxy_pass http://10.100.89.251:10086;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
