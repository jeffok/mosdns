# hkcloud: 993 DoH+VLESS-WS+订阅, 4443 ovpn 代理到 222, 443 DoH
# 订阅文件: conf.d/xray-subscribe/

server {
    listen 993 ssl;
    server_name doh.jeffok.com;
    ssl_certificate /etc/nginx/conf.d/ssl/jeffok.com.crt;
    ssl_certificate_key /etc/nginx/conf.d/ssl/jeffok.com.key;

    location /dns-query {
        proxy_pass https://10.100.50.252:8443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /graph {
        proxy_pass http://10.100.50.251:10086;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /sub/a4050c65.txt {
        alias /etc/nginx/conf.d/xray-subscribe/a4050c65.txt;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
        add_header Content-Disposition "attachment; filename*=UTF-8''%E5%AE%B6%E5%BA%AD%E4%BB%A3%E7%90%86";
        add_header profile-update-interval "24";
    }

    location /sub/0baaee51.txt {
        alias /etc/nginx/conf.d/xray-subscribe/0baaee51.txt;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
        add_header Content-Disposition "attachment; filename*=UTF-8''%E5%AE%B6%E5%BA%AD%E4%BB%A3%E7%90%862";
        add_header profile-update-interval "24";
    }

    location /sub/ss_backcn.conf {
        alias /etc/nginx/conf.d/xray-subscribe/ss_backcn.conf;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
        add_header Content-Disposition "attachment; filename*=UTF-8''%E5%9B%9E%E5%9B%BD%E9%85%8D%E7%BD%AE";
        add_header profile-update-interval "24";
    }

    location /sub/outcn_u1.conf {
        alias /etc/nginx/conf.d/xray-subscribe/outcn_u1.conf;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
        add_header Content-Disposition "attachment; filename*=UTF-8''%E5%87%BA%E5%9B%BD%E9%85%8D%E7%BD%AE-%E7%94%A81";
        add_header profile-update-interval "24";
    }

    location /sub/outcn_u2.conf {
        alias /etc/nginx/conf.d/xray-subscribe/outcn_u2.conf;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
        add_header Content-Disposition "attachment; filename*=UTF-8''%E5%87%BA%E5%9B%BD%E9%85%8D%E7%BD%AE-%E7%94%A82";
        add_header profile-update-interval "24";
    }

    location /sub/ {
        alias /etc/nginx/conf.d/xray-subscribe/;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
    }
}

server {
    listen 4443 ssl;
    server_name ovpn.jeffok.com;
    ssl_certificate /etc/nginx/conf.d/ssl/jeffok.com.crt;
    ssl_certificate_key /etc/nginx/conf.d/ssl/jeffok.com.key;

    location / {
        proxy_pass https://10.100.50.222:943;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect https://ovpn.jeffok.com/ https://ovpn.jeffok.com:4443/;
        proxy_redirect https://10.100.50.222:943/ https://ovpn.jeffok.com:4443/;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    server_name doh.jeffok.com;
    ssl_certificate /etc/nginx/conf.d/ssl/jeffok.com.crt;
    ssl_certificate_key /etc/nginx/conf.d/ssl/jeffok.com.key;

    location /dns-query {
        proxy_pass https://10.100.50.252:8443/dns-query;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }
}
