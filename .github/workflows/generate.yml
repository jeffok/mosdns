name: Generate Configs & Rules

on:
  push:
    branches: [main]
    paths:
      - 'config.base.yaml'
      - 'sites.yaml'
      - 'updater/custom.txt'
      - 'updater/ai-list.txt'
      - 'updater/merge_config.py'
  workflow_dispatch:
      - 'updater/gen_custom_rules.py'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate site configs
        run: |
          for site in sz hk dxb; do
            python updater/merge_config.py --site "$site"
            python updater/merge_config.py --site "$site" --doh
          done

      - name: Generate custom rules
        run: python updater/gen_custom_rules.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/ rules/custom-local.txt rules/custom-hosts.txt rules/ai-list.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: regenerate configs and rules"
          git push
