name: Generate Configs & Rules

on:
  push:
    branches: [main]
    paths:
      - 'config.base.yaml'
      - 'sites.yaml'
      - 'updater/custom.txt'
      - 'updater/ai-list.txt'
      - 'updater/merge_config.py'
      - 'updater/gen_custom_rules.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate site configs
        run: |
          for site in sz hk dxb; do
            python updater/merge_config.py --site "$site"
          done

      - name: Generate custom rules
        run: python updater/gen_custom_rules.py

      - name: Generate ai-sgp-sync.rsc
        run: |
          RSC=scripts/ai-sgp-sync.rsc
          mkdir -p scripts
          {
            echo "# AI SGP address-list sync (generated by CI)"
            echo "/ip/firewall/address-list/remove [find where list=ai-sgp and comment=mosdns-ai]"
            while IFS= read -r line; do
              domain=$(echo "$line" | sed 's/#.*//' | xargs)
              [ -z "$domain" ] && continue
              echo "/ip/firewall/address-list/add list=ai-sgp address=$domain timeout=1d comment=mosdns-ai"
            done < updater/ai-list.txt
          } > "$RSC"
          echo "[ci] generated $RSC"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/ rules/custom-local.txt rules/custom-hosts.txt rules/ai-list.txt scripts/ai-sgp-sync.rsc
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: regenerate configs and rules"
          git push
